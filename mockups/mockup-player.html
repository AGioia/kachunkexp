<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaChunk — Player (Mockup)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #141210;
    --surface: #1E1B18;
    --surface-2: #282420;
    --accent: #C44B1A;
    --accent-glow: rgba(196, 75, 26, 0.15);
    --text: #F0EBE3;
    --text-2: rgba(240, 235, 227, 0.5);
    --text-3: rgba(240, 235, 227, 0.25);
    --ring-track: rgba(240, 235, 227, 0.06);
    --success: #3D8B5E;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 375px;
    min-height: 812px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  /* ─── Header ─── */
  .player-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 56px 20px 12px;
    flex-shrink: 0;
  }

  .back-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: none;
    color: var(--text-2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .back-btn svg {
    width: 18px;
    height: 18px;
  }

  .player-chunk-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-2);
    text-align: center;
    flex: 1;
  }

  .audio-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: none;
    color: var(--text-3);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* ─── Chronometer Face ─── */
  .chrono-container {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 0 16px;
    flex-shrink: 0;
  }

  .chrono-face {
    width: 260px;
    height: 260px;
    position: relative;
  }

  .chrono-face svg {
    width: 100%;
    height: 100%;
  }

  /* Outer ring track */
  .ring-track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 3;
  }

  /* Progress ring */
  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    filter: drop-shadow(0 0 6px rgba(196, 75, 26, 0.3));
    transform-origin: center;
    transform: rotate(-90deg);
  }

  /* Tick marks */
  .tick {
    stroke: var(--text-3);
    stroke-width: 1;
  }

  .tick.major {
    stroke: var(--text-2);
    stroke-width: 1.5;
  }

  /* Center content */
  .chrono-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 200px;
  }

  .step-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .timer-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 52px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 8px;
    font-variant-numeric: tabular-nums;
  }

  .step-counter {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-3);
  }

  /* ─── Controls ─── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 8px 0 24px;
    flex-shrink: 0;
  }

  .ctrl-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--surface);
    border: none;
    color: var(--text-2);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .ctrl-btn svg {
    width: 16px;
    height: 16px;
  }

  .play-btn {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(196, 75, 26, 0.35);
  }

  .play-btn svg {
    width: 24px;
    height: 24px;
    margin-left: 2px;
  }

  /* Pause icon variant */
  .play-btn .pause-icon {
    display: flex;
    gap: 5px;
  }

  .play-btn .pause-icon span {
    width: 4px;
    height: 20px;
    background: white;
    border-radius: 2px;
  }

  /* ─── Step List ─── */
  .steps-section {
    flex: 1;
    padding: 0 20px;
    overflow-y: auto;
  }

  .steps-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 12px;
    padding-left: 4px;
  }

  .step-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 0;
    border-bottom: 1px solid rgba(240, 235, 227, 0.04);
  }

  .step-item:last-child {
    border-bottom: none;
  }

  .step-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--surface);
    color: var(--text-3);
  }

  .step-item.completed .step-num {
    background: var(--success);
    color: white;
    font-size: 10px;
  }

  .step-item.current .step-num {
    background: var(--accent);
    color: white;
  }

  .step-name {
    flex: 1;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-3);
  }

  .step-item.current .step-name {
    color: var(--text);
    font-weight: 500;
  }

  .step-item.completed .step-name {
    color: var(--text-3);
    text-decoration: line-through;
  }

  .step-dur {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-3);
    flex-shrink: 0;
  }

  .step-item.current .step-dur {
    color: var(--accent);
  }

  /* ─── Bottom Safe Area ─── */
  .bottom-safe {
    height: 34px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

  <!-- Header -->
  <div class="player-header">

      <!-- Center content -->
      <div class="chrono-center">
        <div class="step-label">Meditation</div>

        <div class="step-counter">Step 3 of 7</div>

  </div>

  <!-- Controls -->

    <button class="ctrl-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v2H6zM6 16l6-5-6-5z"/><path d="M12 16l6-5-6-5z"/></svg>
    </button>
    <button class="play-btn">
      <div class="pause-icon"><span></span><span></span></div>

  <!-- Step List -->

    <div class="step-item completed">

      <div class="step-name">Wake up + hydrate</div>

</html>
